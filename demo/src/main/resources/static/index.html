<!DOCTYPE html>
<html>
<head>
    <title>Recruitment System</title>
    <style>
        table { border-collapse: collapse; width: 70%; margin: 20px auto; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }
        form { width: 50%; margin: 20px auto; text-align: center; }
        input { margin: 5px; padding: 5px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Recruitment System</h2>

    <h3 style="text-align:center;">Job Openings</h3>
    <table id="jobTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3 style="text-align:center;">Apply for a Job</h3>
    <form id="applyForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="number" id="jobId" placeholder="Job ID" required>
        <button type="submit">Apply</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
